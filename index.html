<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Em Ngàn Lời Yêu ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="heart-container" id="heart-container"></div>
    
    <div class="main-content">
        <header>
            <h1 class="title">Dành cho người đặc biệt nhất...</h1>
        </header>

        <div class="message-box">
            <p id="confession-text" class="typing-text">Chào em, anh có điều muốn nói...</p>
        </div>

        <div class="button-group">
            <button class="btn" onclick="showMessage(1)">Điều anh muốn nói</button>
            <button class="btn" onclick="showMessage(2)">Vì sao là em?</button>
            <button class="btn" onclick="showMessage(3)">Lời hứa của anh</button>
            <button class="btn btn-primary" onclick="showMessage(4)">Anh yêu em ❤️</button>
        </div>

        <div class="music-player">
            <p class="music-title">🎵 Đang phát: Thích em hơi nhiều - HIEUTHUHAI</p>
            <div class="controls">
                <button id="play-pause" class="control-btn">🔇</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
            <audio id="bg-music" loop>
                <source src="Thích Em Hơi Nhiều.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ audio.
            </audio>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
